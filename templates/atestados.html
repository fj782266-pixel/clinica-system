<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atestados - ClínicaSys</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body{margin:0;font-family:Inter,Arial,sans-serif;background:#f8fafc;color:#0f172a;display:flex;min-height:100vh}.sidebar{width:270px;background:linear-gradient(180deg,#064e55,#052e34);padding:30px 18px;box-sizing:border-box;color:white}.logo{font-size:25px;font-weight:800;margin-bottom:45px}.menu{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:8px}.menu a{display:flex;gap:14px;align-items:center;padding:16px 18px;border-radius:12px;color:#d1e7e8;text-decoration:none;font-weight:700}.menu .active a,.menu a:hover{background:linear-gradient(135deg,#14b8a6,#0f766e);color:white}.main{flex:1;padding:34px 42px}.card{background:white;border:1px solid #e2e8f0;border-radius:18px;box-shadow:0 12px 32px rgba(15,23,42,.06);padding:28px;max-width:900px}.field{margin-bottom:16px}.field label{display:block;font-weight:800;margin-bottom:7px}input,textarea{width:100%;border:1px solid #cbd5e1;border-radius:10px;padding:13px;font-size:14px;box-sizing:border-box}textarea{min-height:150px}.btn{background:linear-gradient(135deg,#14b8a6,#0f766e);border:0;color:white;border-radius:10px;padding:13px 22px;font-weight:800;cursor:pointer}.line{height:1px;background:rgba(255,255,255,.15);margin:18px 0}.user{margin-top:35px;color:#cbd5e1;font-size:14px}
    </style>
</head>
<body>
<aside class="sidebar">
    <div class="logo"><i class="bi bi-heart-pulse-fill"></i> ClínicaSys</div>
    <ul class="menu">
        <li><a href="/agendamentos"><i class="bi bi-calendar3"></i> Agendamentos</a></li>
        <li><a href="/receitas"><i class="bi bi-file-earmark-medical"></i> Receitas</a></li>
        <li class="active"><a href="/atestados"><i class="bi bi-shield-check"></i> Atestados</a></li>
        <div class="line"></div>
        <li><a href="/logout"><i class="bi bi-box-arrow-left"></i> Sair</a></li>
    </ul>
    <div class="user">Olá, {{ session.get('usuario', 'Usuário') }}<br>Médico</div>
</aside>
<main class="main">
    <h1>Atestados Médicos</h1>
    <p>Emita atestados médicos para seus pacientes.</p>
    <div class="card">
        <form>
            <div class="field"><label>Paciente</label><input type="text" placeholder="Nome do paciente"></div>
            <div class="field"><label>Dias de afastamento</label><input type="number" min="1" placeholder="Ex: 3"></div>
            <div class="field"><label>Texto do atestado</label><textarea placeholder="Digite o texto do atestado..."></textarea></div>
            <button type="button" class="btn"><i class="bi bi-printer"></i> Gerar Atestado</button>
        </form>
    </div>
</main>
</body>
</html>
