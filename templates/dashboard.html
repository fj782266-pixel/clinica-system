<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel da Clínica</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f6f9;
}
.logo-area{
    text-align:center;
    padding:20px;
}

.logo{
    width:90px;
    height:90px;
    border-radius:50%;
    border:3px solid white;
    object-fit:cover;
}

.logo-area h2{
    font-size:18px;
    margin-top:10px;
}

.sidebar{
    width:260px;
    height:100vh;
    background:#0F766E;
    color:white;
    position:fixed;
    box-shadow:4px 0 20px rgba(0,0,0,.15);
}

.sidebar h2{
    text-align:center;
    padding:20px;
}

.sidebar ul{
    list-style:none;
    padding:0;
}

.sidebar ul li{
    padding:15px;
    cursor:pointer;
}

.sidebar ul li:hover{
    background:#34495e;
}

.content{
    margin-left:250px;
    padding:20px;
}

.cards{
    display:flex;
    gap:20px;
}

.card{
    background:white;
    padding:25px;
    width:220px;
    border-radius:18px;

    box-shadow:
    0 10px 25px rgba(0,0,0,.08);

    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.hero{
    height:250px;

    background:
    linear-gradient(
        rgba(15,118,110,.75),
        rgba(15,118,110,.75)
    ),
    url('{{ url_for("static", filename="img/medicos.jpg") }}');

    background-size:cover;
    background-position:center;

    border-radius:20px;
    overflow:hidden;
    margin-bottom:25px;
}

.hero-overlay{
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
}

.hero-overlay h1{
    font-size:42px;
    margin:0;
}

.hero-overlay p{
    font-size:18px;
}

</style>

</head>
<body>

<div class="sidebar">
    <div class="logo-area">
    <img src="{{ url_for('static', filename='img/logo2.png') }}" class="logo">
    <h2>Essencial Clínica</h2>
</div>

    <ul>
        <li>Dashboard</li>
        <li>Profissionais</li>
        <li>Serviços</li>
        <li>Pacientes</li>
        <li>Agendamentos</li>
    </ul>
</div>

<div class="content"
>
<div class="hero">
    <div class="hero-overlay">
        <h1>Essencial Clínica</h1>
        <p>Sistema de Gestão Profissional</p>
    </div>
</div>

<h1>Painel Administrativo</h1>

<div class="cards">

<div class="card">
<h3>👥 Pacientes</h3>
<p>0</p>
</div>

<div class="card">
<h3>🩺 Profissionais</h3>
<p>0</p>
</div>

<div class="card">
<h3>📅 Consultas Hoje</h3>
<p>0</p>
</div>

</div>

</div>

</body>
</html>
