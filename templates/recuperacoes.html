<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Recuperações de Senha</title>

<style>

body{
    font-family:Arial;
    background:#f4f7fb;
    margin:0;
    padding:30px;
}

.box{
    max-width:900px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.1);
}

h1{
    color:#2c5cff;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#2c5cff;
    color:white;
    padding:12px;
}

td{
    padding:12px;
    border-bottom:1px solid #eee;
}

.btn-atendido{
    background:#22c55e;
    color:white;
    border:none;
    padding:8px 15px;
    border-radius:8px;
    cursor:pointer;
}

.btn-excluir{
    background:#ef4444;
    color:white;
    border:none;
    padding:8px 15px;
    border-radius:8px;
    cursor:pointer;
}

.btn-senha {
    display: inline-block;
    padding: 8px 12px;
    background: #4a90e2;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: bold;
    transition: 0.3s;
    box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}

.btn-senha:hover {
    background: #3b7bd1;
    transform: scale(1.05);
}

.btn-cadastro {
    display: inline-block;
    margin-bottom: 15px;
    padding: 8px 12px;
    background: #27ae60;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    font-size: 13px;
}

.btn-cadastro:hover {
    background: #1f9a52;
}
</style>

</head>
<body>

<div class="box">

<h1>Solicitações de Recuperação</h1>

<a href="/cadastro-usuario" class="btn-cadastro">
    + Novo Usuário
</a>

<table>

<tr>
    <th>ID</th>
    <th>Usuário</th>
    <th>Status</th>
    <th>Ações</th>
    <th>Nova Senha</th>
</tr>

{% for pedido in pedidos %}
<tr>
    <td>{{ pedido.id }}</td>
    <td>{{ pedido.usuario }}</td>
    <td>{{ pedido.status }}</td>

    <td>
        <a href="/senha/{{ pedido.id }}" class="btn-senha">
    🔑 Definir Senha
</a>

        <a href="/gerar-senha/{{ pedido.id }}">
            <button class="btn-atendido">
                Gerar Nova Senha
            </button>
        </a>

        <a href="/excluir-recuperacao/{{ pedido.id }}">
            <button class="btn-excluir">
                Excluir
            </button>
        </a>
    </td>

    <td>
        {{ pedido.nova_senha or '-' }}
    </td>
</tr>
{% endfor %}

</table>
