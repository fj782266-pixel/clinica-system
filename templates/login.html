<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login - Clínica</title>


<style>

/* ================= RESET ================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    height:100vh;
    display:flex;
    background:#f5f7fb;
    overflow:hidden;
}

/* ================= LEFT ================= */

.left{
    width:50%;
    height:100vh;
    position:relative;
    overflow:hidden;
}

/* IMAGEM DE FUNDO */

.slider{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
}

.slider img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center top;
}

/* ESCURECE A IMAGEM */

.slider::after{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(15,23,42,0.45);
}

/* CARD DE TEXTO */

.info{
    position:absolute;
    bottom:60px;
    left:50px;
    z-index:2;

    width:380px;
    padding:30px;

    background:#0F766E;

    backdrop-filter:blur(12px);

    border-radius:20px;

    color:white;

    border:1px solid rgba(255,255,255,0.1);

    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.info h2{
    font-size:32px;
    margin-bottom:15px;
}

.info p{
    line-height:1.6;
    font-size:16px;
}

/* ================= RIGHT ================= */

.right{
    width:50%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:white;
}

.login-box{
    width:450px;
}

/* LOGO */

.logo-img{
    display:flex;
    justify-content:center;
    margin-bottom:20px;
}

.logo-img img{
    width:130px;
    height:130px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid white;
    box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

.logo{
    width:220px;
    height:auto;

    border-radius:25px;

    border:none;

    box-shadow:0 20px 40px rgba(0,0,0,.25);
}

.logo h1{
    color:#0F766E;
    font-size:42px;
}

/* INPUTS */

input{
    width:100%;
    padding:15px;
    margin-bottom:15px;

    border:1px solid #ddd;
    border-radius:30px;

    font-size:16px;
    outline:none;
}

input:focus{
    border-color:#0F766E;
}

/* SENHA */

.senha-box{
    position:relative;
}

.olho{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* BOTÃO */

button{
    width:100%;
    padding:15px;

    border:none;
    border-radius:30px;

    background:#0F766E;
    color:white;

    font-size:16px;
    font-weight:bold;
    cursor:pointer;

    transition:.3s;
}

button:hover{
    background:#0d5f56;
}

/* ESQUECEU SENHA */

.esqueceu{
    text-align:center;
    margin-top:20px;
}

.esqueceu a{
    color:#666;
    text-decoration:none;
}

.esqueceu a:hover{
    color:#0F766E;
}

/* ================= MODAL ================= */

.modal{
    display:none;
    position:fixed;
    inset:0;

    background:rgba(0,0,0,0.5);

    justify-content:center;
    align-items:center;

    z-index:9999;
}

.modal-content{
    background:white;
    width:400px;
    padding:30px;
    border-radius:20px;
    text-align:center;
}

/* ================= TOAST ================= */

#toast{
    position:fixed;
    top:20px;
    right:20px;

    min-width:300px;

    padding:16px 20px;

    border-radius:12px;

    color:white;
    font-weight:600;

    z-index:99999;

    opacity:0;
    transform:translateX(100px);

    transition:.4s;
}

#toast.show{
    opacity:1;
    transform:translateX(0);
}

.toast-success{
    background:#22c55e;
}

.toast-error{
    background:#ef4444;
}

.brand-left{
    position:absolute;
    top:25px;
    left:50%;
    transform:translateX(-50%);
    z-index:3;
    text-align:center;
}

.brand-left img{
    width:450px;
    max-width:90%;
    height:auto;
    filter:drop-shadow(0 8px 20px rgba(0,0,0,.25));

}

.brand-left h1{
    font-size:72px;
    line-height:1;
    font-weight:700;
    margin:0;
    color:#0F766E;
}

.brand-left span{
    display:block;
    margin-top:8px;

    font-size:24px;
    letter-spacing:6px;
    font-weight:500;

    color:#0F766E;
}

.alerta-erro{
    background:#FEE2E2;
    color:#B91C1C;
    border:1px solid #FCA5A5;
    padding:12px;
    border-radius:12px;
    margin-bottom:15px;
    text-align:center;
    font-weight:600;
}

.toast-login{
    position:fixed;
    top:20px;
    right:20px;

    background:#ef4444;
    color:white;

    padding:15px 25px;

    border-radius:12px;

    font-weight:600;

    box-shadow:0 8px 20px rgba(0,0,0,.2);

    z-index:99999;

    animation:slideIn .3s ease;
}

@keyframes slideIn{
    from{
        opacity:0;
        transform:translateX(100%);
    }
    to{
        opacity:1;
        transform:translateX(0);
    }
}

h1{
    white-space: nowrap;
    margin-left: 50px;
}

</style>

</style>
</head>

<body>

<div class="left">
    <div class="slider">
        <img src="{{ url_for('static', filename='logo3.jpg') }}">
    </div>

    <div class="brand-left">
        <img src="{{ url_for('static', filename='logo4.png') }}" alt="Logo">
    </div>

    <div class="info">
        <h2>Sistema para Clínicas</h2>
        <p>
            Gerencie pacientes, consultas,
            profissionais e relatórios em um único lugar.
        </p>
    </div>
</div>

<div class="right">
    <div class="login-box">

        <div class="logo-img">
            <img src="{{ url_for('static', filename='logo2.png') }}">
        </div>

        <div class="logo">
            <h1>Essencial Clínica</h1>
        </div>

       

        <form method="POST">

  {% with messages = get_flashed_messages() %}
    {% if messages %}
        <script>
    mostrarToast("{{ messages[0] }}");
</script>
    {% endif %}
{% endwith %}

    <input type="text" name="usuario" placeholder="Usuário">

    <div class="senha-box">

        <input
            type="password"
            name="senha"
            id="senha"
            placeholder="Senha">

        <span class="olho" onclick="toggleSenha()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path
            d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z"
            stroke="black"
            stroke-width="2"
        />
        <circle
            cx="12"
            cy="12"
            r="3"
            stroke="black"
            stroke-width="2"
        />
    </svg>
</span>
    </div>

    <button type="submit">
        Entrar
    </button>

</form>

        <div class="esqueceu">
    <a href="#" onclick="abrirModal()">Esqueceu a senha?</a>
</div>

    </div>

</div>
<div id="modalSenha" class="modal">

    <div class="modal-content">

        <span class="fechar" onclick="fecharModal()">&times;</span>

        <h2>Recuperar Senha</h2>

        <p>Informe seu usuário para solicitar uma nova senha.</p>

        <input
    type="text"
    id="usuarioRecuperacao"
    placeholder="Usuário">

       <button onclick="enviarSolicitacao()">
    Enviar Solicitação
</button>

    </div>
</div>

<div id="toast"></div>


<script>

function abrirModal(){
    document.getElementById("modalSenha").style.display = "flex";
}

function fecharModal(){
    document.getElementById("modalSenha").style.display = "none";
}

window.onclick = function(event){

    let modal = document.getElementById("modalSenha");

    if(event.target == modal){
        modal.style.display = "none";
    }

}

</script>

<div id="toast"></div>

<script>

function abrirModal(){
    document.getElementById("modalSenha").style.display = "flex";
}

function fecharModal(){
    document.getElementById("modalSenha").style.display = "none";
}

window.onclick = function(event){

    let modal = document.getElementById("modalSenha");

    if(event.target == modal){
        modal.style.display = "none";
    }
}

function enviarSolicitacao(){

    let usuario = document.getElementById("usuarioRecuperacao").value;

    fetch("/verificar-usuario", {

        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "usuario=" + encodeURIComponent(usuario)

    })
    .then(response => response.json())
    .then(data => {

        if(data.existe){
            mostrarToast("✅ Solicitação enviada com sucesso!", "success");
            fecharModal();
        } else {
            mostrarToast("❌ Usuário não encontrado.", "error");
        }

    });
}

function toggleSenha(){

    let campo = document.getElementById("senha");

    if(campo.type === "password"){
        campo.type = "text";
    } else {
        campo.type = "password";
    }
}

</script>
<script>
function mostrarToast(mensagem, tipo){

    let toast = document.getElementById("toast");

    toast.innerHTML = mensagem;
    toast.className = "";
    toast.classList.add("show");

    if(tipo === "success"){
        toast.classList.add("toast-success");
    }else{
        toast.classList.add("toast-error");
    }

    setTimeout(() => {
        toast.classList.remove("show");
    }, 3000);
}
</script>

<script>
let slides = document.querySelectorAll(".slide");
let index = 0;

setInterval(() => {

    if (slides.length === 0) return; // evita erro

    slides[index].classList.remove("active");

    index = (index + 1) % slides.length;

    slides[index].classList.add("active");

}, 10000);
</script>
<script>
function mostrarToast(mensagem){

    let toast = document.getElementById("toast");

    toast.innerHTML = mensagem;

    toast.style.background = "#ef4444";
    toast.style.color = "white";
    toast.style.padding = "15px";
    toast.style.borderRadius = "10px";

    toast.style.position = "fixed";
    toast.style.top = "20px";
    toast.style.right = "20px";

    setTimeout(() => {
        toast.innerHTML = "";
    }, 3000);
}
</script>

</body>
</html>
